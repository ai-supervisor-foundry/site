<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Foundry</title>
    <script>
      // Single Page Apps for GitHub Pages
      // Encodes the path into a query param and redirects to index.html
      // pathSegmentsToKeep = 1 because the site is deployed under /site/
      var l = window.location;
      // Guard: if already carrying a redirect marker, don't redirect again
      if (l.search[1] !== '/') {
        var pathSegmentsToKeep = 1;
        var segments = l.pathname.split('/');
        var base = segments.slice(0, 1 + pathSegmentsToKeep).join('/');
        var rest = segments.slice(1 + pathSegmentsToKeep).join('/').replace(/&/g, '~and~');
        l.replace(
          l.protocol + '//' + l.host + base + '/?/' + rest +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      }
    </script>
  </head>
  <body></body>
</html>
